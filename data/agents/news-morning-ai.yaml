# The News Agent — the first inhabitant of the farm (the vertical slice's target).
# Runtime DSL v0.1, flat record. Hand-written for now (patron + compiler come later).
#
# Fired daily by an agent_scheduler cron job whose event carries { agent: news-morning-ai }
# to stream:agent-runtime. The farm resolves this record by id and runs it.
#
# Tools come from the DECOUPLED mcp-service (server key "mcp" -> MCP_URL), NOT noted.
# mcp__newsapi_search + mcp__fetch_url must be added as impls to mcp-service first
# (newsapi_search needs a NewsAPI key in mcp-service config). See Step 5.
version: "0.1"
id: news-morning-ai
description: "Morning AI headlines to the ops WhatsApp chat"

trigger:
  type: schedule

brain:
  persona: news_curator              # agent_server preset (created in Step 5)
  llm: { temperature: 0.3, max_tokens: 1024 }

tools:
  server: mcp                        # MCP server key (-> MCP_URL = mcp-service)
  allow: [mcp__newsapi_search, mcp__fetch_url]
  max_rounds: 3

input:
  template: "Curate the {n} best morning headlines about {topic}."
  vars: { n: 5, topic: "AI agents" }

delivery:
  channel: whatsapp
  target: "351961050313@c.us"
