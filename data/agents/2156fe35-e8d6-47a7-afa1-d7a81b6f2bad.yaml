version: '0.1'
uid: 2156fe35-e8d6-47a7-afa1-d7a81b6f2bad
name: news-morning-ai
description: Morning AI headlines to the ops WhatsApp chat
trigger:
  type: schedule
brain:
  persona: news_curator
  llm:
    temperature: 0.3
    max_tokens: 16384
tools:
  server: mcp
  allow:
  - mcp__newsapi_search
  - mcp__fetch_url
  max_rounds: 3
input:
  template: Curate the {n} best morning headlines about {topic}.
  vars:
    n: 5
    topic: AI agents
delivery:
  channel: whatsapp
  target: 351961050313@c.us
