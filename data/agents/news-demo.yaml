# Runnable DEMO of the News Agent slice — uses mcp__web_search (live on mcp-service)
# instead of mcp__newsapi_search (pending António's mcp-service work). Delivers to the
# WhatsApp group "L2K Chat". This is the interim, runnable-today agent; the canonical
# spec target is news-morning-ai.yaml (newsapi_search + its own target).
version: "0.1"
id: news-demo
description: "News Agent demo (web_search) → L2K Chat"

trigger:
  type: schedule

brain:
  persona: news_curator
  # 16K output budget: the model reasons in <think> then emits the list; 1K
  # truncated it. The record's llm overrides the preset, so set it here too.
  llm: { temperature: 0.3, max_tokens: 16384 }

tools:
  server: mcp
  allow: [mcp__web_search]
  max_rounds: 4

input:
  template: "Curate the {n} best morning headlines about {topic}."
  vars: { n: 5, topic: "AI agents" }

delivery:
  channel: whatsapp
  target: "120363427427912302@g.us"   # WhatsApp group "L2K Chat"
