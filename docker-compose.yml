services:
  agent-runtime-app:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        # The bus SDK lives in the sibling agent_bus repo; supply it to the build.
        busclient_sdk: ../agent_bus/sdk/python
    image: agent_runtime:0.1
    container_name: agent-runtime-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach the bus + sibling services by their service names on the network.
      VALKEY_HOST: valkey-bus
    ports:
      # Health/observability API, localhost-bound (nginx fronts external access).
      - "127.0.0.1:6817:6817"
    volumes:
      # Persist agent records on the host so Patron deploys (admin API writes here)
      # survive a rebuild — data/ is otherwise baked into the image via COPY and the
      # container fs is ephemeral. The host dir is the source of truth: the registry
      # loads from it at boot and the admin API writes to it on deploy.
      - ./data/agents:/app/data/agents
    networks:
      # logus2k_network: valkey-bus, agent_server, whatsapp-bridge.
      # noted-network: mcp-service (the decoupled tool host).
      - logus2k_network
      - noted-network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:6817/health'); sys.exit(0)"
      interval: 10s
      timeout: 5s
      retries: 5

# valkey-bus is owned by the agent_bus compose project; mcp-service by the mcp
# compose. We only join their (external) networks.
networks:
  logus2k_network:
    external: true
  noted-network:
    external: true
